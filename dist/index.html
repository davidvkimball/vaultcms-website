        .theme-showcase {
          width: 100%;
          display: flex;
          justify-content: center;
          padding: 1rem 0 3rem;
        }

        .cards-stack {
          position: relative;
          width: 420px;
          max-width: 90vw;
          aspect-ratio: 1275 / 806;
        }

        .card {
          position: absolute;
          inset: 0;
          border-radius: 12px;
          overflow: hidden;
          border: 1px solid hsl(var(--border));
          background: hsl(var(--card));
          box-shadow:
            0 4px 24px rgba(0, 0, 0, 0.10),
            0 1px 4px rgba(0, 0, 0, 0.06);
          transition:
            opacity 0.7s cubic-bezier(0.4, 0, 0.2, 1),
            transform 0.7s cubic-bezier(0.4, 0, 0.2, 1),
            box-shadow 0.7s cubic-bezier(0.4, 0, 0.2, 1);
          will-change: transform, opacity;
        }

        .card-active {
          cursor: zoom-in;
        }

        .card img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          display: block;
        }

        .card-name {
          position: absolute;
          bottom: 0;
          left: 0;
          right: 0;
          padding: 8px 14px;
          background: linear-gradient(to top, rgba(0,0,0,0.65) 0%, transparent 100%);
          color: white;
          font-size: 12px;
          font-weight: 600;
          letter-spacing: 0.02em;
          display: flex;
          align-items: center;
          gap: 6px;
        }

        .badge {
          font-size: 9px;
          font-weight: 700;
          text-transform: uppercase;
          letter-spacing: 0.06em;
          background: linear-gradient(135deg, hsl(var(--primary)), hsl(var(--secondary)));
          padding: 2px 6px;
          border-radius: 4px;
          color: white;
        }

        .card-active {
          z-index: 3;
          opacity: 1;
          transform: translateY(0) scale(1);
          box-shadow:
            0 8px 40px rgba(0, 0, 0, 0.14),
            0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .card-leaving {
          z-index: 4;
          opacity: 0;
          transform: translateY(-12px) scale(1.01);
        }

        .card-behind-1 {
          z-index: 2;
          opacity: 0.5;
          transform: translateY(10px) scale(0.96);
          box-shadow:
            0 2px 12px rgba(0, 0, 0, 0.06);
        }

        .card-behind-2 {
          z-index: 1;
          opacity: 0.25;
          transform: translateY(18px) scale(0.92);
          box-shadow: none;
        }

        .card-hidden {
          z-index: 0;
          opacity: 0;
          transform: translateY(24px) scale(0.90);
          pointer-events: none;
        }

        /* Lightbox */
        .lightbox {
          position: fixed;
          inset: 0;
          z-index: 100;
          display: flex;
          align-items: center;
          justify-content: center;
          background: rgba(0, 0, 0, 0);
          backdrop-filter: blur(0px);
          cursor: zoom-out;
          transition:
            background 0.3s cubic-bezier(0.4, 0, 0.2, 1),
            backdrop-filter 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .lightbox-visible {
          background: rgba(0, 0, 0, 0.85);
          backdrop-filter: blur(12px);
        }

        .lightbox-content {
          position: relative;
          max-width: 90vw;
          max-height: 85vh;
          border-radius: 12px;
          overflow: hidden;
          box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
          transform: scale(0.92);
          opacity: 0;
          transition:
            transform 0.3s cubic-bezier(0.4, 0, 0.2, 1),
            opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
          cursor: zoom-out;
        }

        .lightbox-visible .lightbox-content {
          transform: scale(1);
          opacity: 1;
        }

        .lightbox-content img {
          display: block;
          max-width: 90vw;
          max-height: 85vh;
          object-fit: contain;
        }

        .lightbox-label {
          position: absolute;
          bottom: 0;
          left: 0;
          right: 0;
          padding: 12px 18px;
          background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
          color: white;
          font-size: 14px;
          font-weight: 600;
          letter-spacing: 0.02em;
          display: flex;
          align-items: center;
          gap: 8px;
        }

        @media (min-width: 640px) {
          .cards-stack {
            width: 520px;
          }

          .card-name {
            padding: 10px 16px;
            font-size: 13px;
          }

          .badge {
            font-size: 10px;
          }
        }
